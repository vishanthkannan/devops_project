<!DOCTYPE html>
<html>
<head>
    <title>Hotel Room Allocation(perundurai)</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            margin: 0;
        }
        header {
            background: #1f2937;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            padding: 20px;
            justify-content: center;
        }
        .card {
            background: white;
            width: 200px;
            margin: 10px;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .available { background: #d1fae5; }
        .occupied { background: #fee2e2; }
        .reserved { background: #fef3c7; }

        button {
            margin: 5px;
            padding: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .book { background: #10b981; color: white; }
        .release { background: #ef4444; color: white; }
    </style>
</head>
<body>

<header>
    <h2>Hotel Room Allocation System</h2>
</header>

<div class="container" id="rooms"></div>

<script>
async function loadRooms() {
    const res = await fetch("/api/rooms");
    const data = await res.json();

    const container = document.getElementById("rooms");
    container.innerHTML = "";

    data.forEach(room => {
        const div = document.createElement("div");
        div.className = `card ${room.status.toLowerCase()}`;

        div.innerHTML = `
            <h3>Room ${room.id}</h3>
            <p>Status: ${room.status}</p>
            <button class="book" onclick="book(${room.id})">Book</button>
            <button class="release" onclick="release(${room.id})">Release</button>
        `;

        container.appendChild(div);
    });
}

async function book(id) {
    await fetch(`/api/book/${id}`, { method: "POST" });
    loadRooms();
}

async function release(id) {
    await fetch(`/api/release/${id}`, { method: "POST" });
    loadRooms();
}

loadRooms();
</script>

</body>
</html>
