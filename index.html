<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Pipeline</title>
    <style>
        /* Base page styling for a dark theme so the glowing animation pops */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
            font-family: "Poppins", sans-serif;
            overflow: hidden;
        }

        /* The main website content */
        #main-content {
            display: none;
            font-size: 2.5em;
            text-align: center;
            font-weight: 600;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ----- Loader Animation CSS Provided ----- */
        .wrapper-grid {
          --animation-duration: 2.1s;
          --cube-color: #0000;
          --highlight-color: #00cc44;
          --cube-width: 48px;
          --cube-height: 48px;
          --font-size: 1.8em;

          position: relative;
          inset: 0;

          display: grid;
          grid-template-columns: repeat(7, var(--cube-width));
          grid-template-rows: auto;
          grid-gap: 0;

          width: calc(7 * var(--cube-width));
          height: var(--cube-height);
          perspective: 350px;

          font-size: var(--font-size);
          font-weight: 800;
          color: transparent;
        }

        .cube {
          position: relative;
          transform-style: preserve-3d;
        }

        .face {
          position: absolute;
          display: flex;
          align-items: center;
          justify-content: center;
          width: var(--cube-width);
          height: var(--cube-height);
          background-color: var(--cube-color);
        }
        .face-left,
        .face-right,
        .face-back,
        .face-front {
          box-shadow:
            inset 0 0 2px 1px #0001,
            inset 0 0 12px 1px #fff1;
        }
        .face-front {
          transform: rotateY(0deg) translateZ(calc(var(--cube-width) / 2));
        }
        .face-back {
          transform: rotateY(180deg) translateZ(calc(var(--cube-width) / 2));
          opacity: 0.6;
        }
        .face-left {
          transform: rotateY(-90deg) translateZ(calc(var(--cube-width) / 2));
          opacity: 0.6;
        }
        .face-right {
          transform: rotateY(90deg) translateZ(calc(var(--cube-width) / 2));
          opacity: 0.6;
        }
        .face-top {
          height: var(--cube-width);
          transform: rotateX(90deg) translateZ(calc(var(--cube-width) / 2));
          opacity: 0.8;
        }
        .face-bottom {
          height: var(--cube-width);
          transform: rotateX(-90deg)
            translateZ(calc(var(--cube-height) - var(--cube-width) * 0.5));
          opacity: 0.8;
        }

        .cube:nth-child(1) { z-index: 0; animation-delay: 0s; }
        .cube:nth-child(2) { z-index: 1; animation-delay: 0.2s; }
        .cube:nth-child(3) { z-index: 2; animation-delay: 0.4s; }
        .cube:nth-child(4) { z-index: 3; animation-delay: 0.6s; }
        .cube:nth-child(5) { z-index: 2; animation-delay: 0.8s; }
        .cube:nth-child(6) { z-index: 1; animation-delay: 1s; }
        .cube:nth-child(7) { z-index: 0; animation-delay: 1.2s; }

        .cube {
          animation: translate-z var(--animation-duration) ease-in-out infinite;
        }
        .cube .face {
          animation:
            face-color var(--animation-duration) ease-in-out infinite,
            edge-glow var(--animation-duration) ease-in-out infinite;
          animation-delay: inherit;
        }
        .cube .face.face-front {
          animation:
            face-color var(--animation-duration) ease-in-out infinite,
            face-glow var(--animation-duration) ease-in-out infinite,
            edge-glow var(--animation-duration) ease-in-out infinite;
          animation-delay: inherit;
        }

        @keyframes translate-z {
          0%, 40%, 100% { transform: translateZ(-2px); }
          30% { transform: translateZ(16px) translateY(-1px); }
        }
        @keyframes face-color {
          0%, 50%, 100% { background-color: var(--cube-color); }
          10% { background-color: var(--highlight-color); }
        }
        @keyframes face-glow {
          0%, 50%, 100% { color: #fff0; filter: none; }
          30% { color: #fff; filter: drop-shadow(0 14px 10px var(--highlight-color)); }
        }
        @keyframes edge-glow {
          0%, 40%, 100% { box-shadow: inset 0 0 2px 1px #0001, inset 0 0 12px 1px #fff1; }
          30% { box-shadow: 0 0 2px 0px var(--highlight-color); }
        }
    </style>
</head>
<body>

    <!-- Loading Animation Container -->
    <div id="loader" class="wrapper-grid">
      <div class="cube"><div class="face face-front">L</div><div class="face face-back"></div><div class="face face-right"></div><div class="face face-left"></div><div class="face face-top"></div><div class="face face-bottom"></div></div>
      <div class="cube"><div class="face face-front">O</div><div class="face face-back"></div><div class="face face-right"></div><div class="face face-left"></div><div class="face face-top"></div><div class="face face-bottom"></div></div>
      <div class="cube"><div class="face face-front">A</div><div class="face face-back"></div><div class="face face-right"></div><div class="face face-left"></div><div class="face face-top"></div><div class="face face-bottom"></div></div>
      <div class="cube"><div class="face face-front">D</div><div class="face face-back"></div><div class="face face-right"></div><div class="face face-left"></div><div class="face face-top"></div><div class="face face-bottom"></div></div>
      <div class="cube"><div class="face face-front">I</div><div class="face face-back"></div><div class="face face-right"></div><div class="face face-left"></div><div class="face face-top"></div><div class="face face-bottom"></div></div>
      <div class="cube"><div class="face face-front">N</div><div class="face face-back"></div><div class="face face-right"></div><div class="face face-left"></div><div class="face face-top"></div><div class="face face-bottom"></div></div>
      <div class="cube"><div class="face face-front">G</div><div class="face face-back"></div><div class="face face-right"></div><div class="face face-left"></div><div class="face face-top"></div><div class="face face-bottom"></div></div>
    </div>

    <!-- Main Content Container -->
    <div id="main-content">
        Hello i am Vishanth, ci/cd works fine!!!
    </div>

    <!-- Script to transition between loader and main content -->
    <script>
        // Simulate a 3.5 second loading period (long enough to see the beautiful animation!)
        setTimeout(() => {
            // Hide the loader
            document.getElementById('loader').style.display = 'none';
            // Show the main website
            document.getElementById('main-content').style.display = 'block';
        }, 3500); 
    </script>
</body>
</html>
