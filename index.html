<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Room Allocation (Perundurai-Erode)</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: #333;
        }
        header {
            background: url('https://images.unsplash.com/photo-1566073771259-6a8506099945?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80') center/cover no-repeat;
            color: white;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(31, 41, 55, 0.7);
            z-index: 1;
        }
        header > * {
            position: relative;
            z-index: 2;
        }
        header h2 {
            margin: 0 0 10px 0;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        header p {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 300;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        .available {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
        }
        .occupied {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
        }
        .reserved {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
        }
        .room-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .card h3 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            font-weight: 500;
            color: #1f2937;
        }
        .card p {
            margin: 0 0 20px 0;
            font-size: 1rem;
            font-weight: 400;
            color: #4b5563;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .available .status-badge { background: #10b981; color: white; }
        .occupied .status-badge { background: #ef4444; color: white; }
        .reserved .status-badge { background: #f59e0b; color: white; }
        button {
            margin: 5px;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .book {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .book:hover {
            background: linear-gradient(135deg, #059669, #047857);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }
        .release {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }
        .release:hover {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
        }
        .stats {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .stat {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            min-width: 120px;
        }
        .stat h4 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
            color: #1f2937;
        }
        .stat p {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: #3b82f6;
        }
        @media (max-width: 768px) {
            .container {
                padding: 20px;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            }
            header h2 {
                font-size: 2rem;
            }
            header p {
                font-size: 1rem;
            }
            .card {
                padding: 20px;
            }
            .room-image {
                height: 120px;
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>

<header>
    <h2>Hotel Room Allocation System</h2>
    <p>Kongu Engineering College - Perundurai to Erode</p>
    <p>Welcome to our hotel room management system. Easily book and manage room allocations for your stay.</p>
</header>

<div class="stats" id="stats">
    <!-- Stats will be populated by JS if needed, but keeping UI only -->
</div>

<div class="container" id="rooms"></div>

<script>
async function loadRooms() {
    const res = await fetch("/api/rooms");
    const data = await res.json();

    const container = document.getElementById("rooms");
    container.innerHTML = "";

    data.forEach(room => {
        const div = document.createElement("div");
        div.className = `card ${room.status.toLowerCase()}`;

        div.innerHTML = `
            <img src="https://images.unsplash.com/photo-1631049307264-da0ec9d70304?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="Hotel Room" class="room-image">
            <h3>Room ${room.id}</h3>
            <p class="status-badge">${room.status}</p>
            <button class="book" onclick="book(${room.id})"><i class="fas fa-calendar-check"></i> Book</button>
            <button class="release" onclick="release(${room.id})"><i class="fas fa-calendar-times"></i> Release</button>
        `;

        container.appendChild(div);
    });
}

async function book(id) {
    await fetch(`/api/book/${id}`, { method: "POST" });
    loadRooms();
}

async function release(id) {
    await fetch(`/api/release/${id}`, { method: "POST" });
    loadRooms();
}

loadRooms();
</script>

</body>
</html>
